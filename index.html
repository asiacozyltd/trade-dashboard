<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>貿易大漁｜管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0b1d35;--sea:#0369a1;--wave:#0ea5e9;--gold:#d97706;--gold2:#fbbf24;--jade:#16a34a;--coral:#dc2626;--paper:#f0f6fc;--card:#fff;--muted:#64748b;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--paper);font-family:'Noto Sans TC',sans-serif;color:var(--ink);min-height:100vh;}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink);}
.lb{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.lfish{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,var(--sea),var(--wave));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;}
.ltitle{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;text-align:center;}
.lsub{font-size:11px;color:var(--muted);text-align:center;margin-top:3px;margin-bottom:20px;}
.rtabs{display:flex;gap:5px;background:#f8fafc;border-radius:10px;padding:4px;margin-bottom:18px;}
.rtab{flex:1;padding:8px 4px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;color:var(--muted);border:none;background:none;}
.rtab.on{background:#fff;color:var(--sea);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.llbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px;}
.linput{width:100%;background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;font-family:inherit;margin-bottom:14px;}
.linput:focus{border-color:var(--sea);}
.lbtn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--sea),var(--wave));color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.lerr{color:var(--coral);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}
.lpwdbox{margin-top:14px;padding:10px 12px;background:#f8fafc;border-radius:8px;font-size:11px;color:#94a3b8;line-height:1.9;}
.hd{background:var(--ink);padding:12px 20px;position:sticky;top:0;z-index:100;}
.hd-row{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:9px;}
.hfish{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--sea),var(--wave));display:flex;align-items:center;justify-content:center;font-size:15px;}
.bname{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--gold2);}
.bsub{font-size:9px;color:#7fa0c0;}
.hdr{display:flex;align-items:center;gap:8px;}
.rbadge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;}
.rb1{background:rgba(212,168,19,.2);color:var(--gold2);border:1px solid rgba(212,168,19,.3);}
.rb2{background:rgba(14,165,233,.2);color:var(--wave);border:1px solid rgba(14,165,233,.3);}
.out{font-size:11px;color:#7fa0c0;cursor:pointer;padding:4px 8px;border-radius:6px;}
.ref-btn{font-size:11px;color:var(--wave);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid rgba(14,165,233,.3);background:rgba(14,165,233,.1);}
.alert{background:linear-gradient(90deg,#78350f,var(--gold));padding:9px 20px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:#fff;}
.alert.hide{display:none;}
.nav-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;}
.nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.nav-tab.on{color:var(--sea);border-bottom-color:var(--sea);font-weight:700;}
.scr{display:none;padding:20px;max-width:1200px;}
.scr.on{display:block;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:700px){.sg{grid-template-columns:1fr 1fr;}}
.st{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(11,29,53,.06);}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.s1::before{background:linear-gradient(90deg,var(--sea),var(--wave));}
.s2::before{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.s3::before{background:linear-gradient(90deg,var(--jade),#4ade80);}
.s4::before{background:linear-gradient(90deg,var(--coral),#f87171);}
.stico{font-size:20px;margin-bottom:6px;display:block;}
.stlbl{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;}
.stval{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.v1{color:var(--sea);}.v2{color:var(--gold);}.v3{color:var(--jade);}.v4{color:var(--coral);}
.stsub{font-size:11px;color:var(--muted);margin-top:4px;}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(11,29,53,.06);}
.sbox-title{font-size:16px;font-weight:700;margin-bottom:3px;}
.sbox-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.sg2{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:700px){.sg2{grid-template-columns:1fr 1fr;}}
.sf label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.sf select,.sf input{width:100%;background:#f8fafc;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit;color:var(--ink);}
.sf select:focus,.sf input:focus{border-color:var(--sea);background:#fff;}
.sbtns{display:flex;gap:8px;margin-bottom:4px;}
.btn-sq{padding:9px 20px;border-radius:8px;background:var(--sea);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.btn-cl{padding:9px 16px;border-radius:8px;background:#f1f5f9;color:var(--muted);font-size:13px;font-weight:700;border:1px solid var(--border);cursor:pointer;}
.rc{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;}
.twrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(11,29,53,.06);overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:860px;}
.tbl thead th{padding:10px 12px;background:#f8fafc;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.tbl tbody tr{border-bottom:1px solid #f8fafc;}
.tbl tbody tr:hover{background:#f8fafc;}
.tbl td{padding:10px 12px;vertical-align:middle;}
.tdg{color:var(--muted);font-size:12px;}
.tdb{font-weight:700;}
.bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.bp{background:#fef9c3;color:#92400e;border:1px solid #fde68a;}
.ba{background:#dcfce7;color:#14532d;border:1px solid #86efac;}
.br{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.btn-v{padding:5px 12px;border-radius:6px;background:var(--sea);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;}
.mg{color:var(--jade);font-family:'DM Mono',monospace;font-weight:500;}
.mr{color:var(--coral);font-family:'DM Mono',monospace;font-weight:500;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--card);border-radius:16px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:mup .25s ease;}
@keyframes mup{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhd{background:var(--ink);padding:16px 20px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;z-index:10;}
.mcl{color:#7fa0c0;font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;}
.mbody{padding:20px;}
.dsec{margin-bottom:16px;}
.dsec-t{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.tb{color:#dc2626;}.tb::before{content:'';width:2px;height:11px;background:#dc2626;border-radius:1px;display:inline-block;}
.ts{color:#16a34a;}.ts::before{content:'';width:2px;height:11px;background:#16a34a;border-radius:1px;display:inline-block;}
.tsh{color:#0369a1;}.tsh::before{content:'';width:2px;height:11px;background:#0369a1;border-radius:1px;display:inline-block;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.drow{background:#f8fafc;border-radius:8px;padding:8px 12px;}
.drow-l{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.drow-v{font-size:13px;color:var(--ink);font-weight:500;word-break:break-word;}
.drow-f{grid-column:1/-1;}
.pbar{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin:14px 0 0;}
.af{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:16px;margin-top:14px;}
.af-t{font-size:13px;font-weight:700;color:#78350f;margin-bottom:10px;}
.af-lbl{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.af-note{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;height:70px;resize:none;outline:none;font-family:inherit;margin-bottom:12px;}
.af-note:focus{border-color:var(--sea);}
.abtns{display:flex;gap:8px;}
.bok{flex:2;padding:11px;border-radius:9px;background:linear-gradient(135deg,#15803d,var(--jade));color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.bng{flex:1;padding:11px;border-radius:9px;background:#fef2f2;color:var(--coral);border:1px solid #fca5a5;font-size:13px;font-weight:700;cursor:pointer;}
.bok:disabled,.bng:disabled{opacity:.5;cursor:not-allowed;}
.asec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(11,29,53,.06);}
.asec-t{font-size:15px;font-weight:700;margin-bottom:3px;}
.asec-s{font-size:12px;color:var(--muted);margin-bottom:16px;}
.ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:700px){.ugrid{grid-template-columns:1fr;}}
.uc{border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;}
.uc-role{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.uc-nm{font-size:15px;font-weight:700;margin-bottom:10px;}
.uc-f{margin-bottom:8px;}
.uc-l{font-size:10px;color:var(--muted);margin-bottom:3px;display:block;}
.uc-i{width:100%;background:#f8fafc;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit;}
.uc-i:focus{border-color:var(--sea);}
.btn-su{width:100%;padding:8px;border-radius:7px;background:var(--sea);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;margin-top:4px;}
.svd{display:none;position:absolute;top:10px;right:10px;background:#dcfce7;color:#14532d;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.ltbl{width:100%;border-collapse:collapse;font-size:12px;}
.ltbl th{padding:8px 12px;background:#f8fafc;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);text-align:left;}
.ltbl td{padding:8px 12px;border-bottom:1px solid #f8fafc;}
.ltag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.lok{background:#dcfce7;color:#14532d;}.lng{background:#fee2e2;color:#991b1b;}.lin{background:#e0f2fe;color:#075985;}
.pulse{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 1.5s infinite;margin-left:3px;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--wave);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;color:var(--muted);font-size:13px;}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;}
.eico{font-size:40px;display:block;margin-bottom:10px;opacity:.4;}
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all .3s cubic-bezier(.175,.885,.32,1.275);pointer-events:none;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="L">
<div class="lw"><div class="lb">
  <div class="lfish">🐟</div>
  <div class="ltitle">貿易大漁</div>
  <div class="lsub">業務管理系統</div>
  <div class="rtabs">
    <button class="rtab on" data-role="boss" onclick="setR(this)">👑 董事長</button>
    <button class="rtab" data-role="staff" onclick="setR(this)">👤 業務員</button>
    <button class="rtab" data-role="finance" onclick="setR(this)">💰 財務</button>
  </div>
  <label class="llbl">密碼</label>
  <input class="linput" type="password" id="lpwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')login()">
  <button class="lbtn" onclick="login()">登入</button>
  <div class="lerr" id="lerr"></div>
  <div class="lpwdbox">🔑 預設密碼<br>
    董事長：<b style="color:#d97706">boss2026</b><br>
    業務員：<b style="color:#0ea5e9">staff2026</b><br>
    財務：<b style="color:#16a34a">finance2026</b></div>
</div></div>
</div>

<!-- APP -->
<div id="A" style="display:none;">
<header class="hd">
  <div class="hd-row">
    <div class="brand">
      <div class="hfish">🐟</div>
      <div><div class="bname">貿易大漁</div><div class="bsub" id="hsub">管理系統</div></div>
    </div>
    <div class="hdr">
      <span class="rbadge" id="rbdg"></span>
      <span class="ref-btn" onclick="load()">↻ 重新整理</span>
      <span class="out" onclick="logout()">登出</span>
    </div>
  </div>
</header>
<div class="alert hide" id="abar">
  <span id="atxt"></span>
  <span onclick="goTab('approval')" style="cursor:pointer;text-decoration:underline;">前往審核 →</span>
</div>
<div class="nav-tabs" id="ntabs"></div>
<div class="scr on" id="s-dash"><div id="dc"><div class="loading"><div class="spin"></div>載入中...</div></div></div>
<div class="scr" id="s-records">
  <div class="sbox">
    <div class="sbox-title">海之寶 案件簽核總表</div>
    <div class="sbox-sub">可依狀態、業務、日期查詢，預設為最新優先。</div>
    <div class="sg2">
      <div class="sf"><label>狀態</label>
        <select id="fs">
          <option value="">全部</option>
          <option value="p">未簽核</option>
          <option value="a">已同意</option>
          <option value="r">退回</option>
        </select></div>
      <div class="sf"><label>業務</label><select id="fst"><option value="">全部</option></select></div>
      <div class="sf"><label>日期起</label><input type="date" id="ff"></div>
      <div class="sf"><label>日期迄</label><input type="date" id="ft"></div>
    </div>
    <div class="sbtns">
      <button class="btn-sq" onclick="doSearch()">查詢</button>
      <button class="btn-cl" onclick="clearSearch()">清除條件</button>
    </div>
  </div>
  <div class="rc" id="rc"></div>
  <div class="twrap"><table class="tbl">
    <thead><tr><th>狀態</th><th>案件號碼</th><th>時間</th><th>業務</th><th>案件屬性</th><th>案件名稱</th><th>客戶</th><th>應收總金額</th><th>預估毛利潤</th><th>備註</th><th>操作</th></tr></thead>
    <tbody id="tb"></tbody>
  </table></div>
</div>
<div class="scr" id="s-approval"><div id="al"></div></div>
<div class="scr" id="s-log">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
    <table class="ltbl"><thead><tr><th>時間</th><th>操作者</th><th>動作</th><th>對象</th><th>備注</th></tr></thead>
    <tbody id="lb"></tbody></table>
  </div>
</div>
<div class="scr" id="s-admin">
  <div class="asec">
    <div class="asec-t">⚙️ 帳號權限管理</div>
    <div class="asec-s">管理登入者的名稱與密碼，設定後立即生效。</div>
    <div class="ugrid" id="ug"></div>
  </div>
  <div class="asec">
    <div class="asec-t">🔑 新增自訂帳號</div>
    <div class="asec-s">可新增業務員或其他角色的帳號。</div>
    <div id="cu"></div>
    <button onclick="addCU()" style="margin-top:10px;padding:9px 16px;border-radius:8px;background:var(--sea);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;">+ 新增帳號</button>
  </div>
</div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="DM">
  <div class="modal-box">
    <div class="mhd">
      <div>
        <div style="font-size:11px;color:#7fa0c0;margin-bottom:2px;" id="dm-id"></div>
        <div style="font-size:15px;font-weight:700;color:var(--gold2);" id="dm-nm"></div>
        <div style="font-size:11px;color:#7fa0c0;margin-top:2px;" id="dm-tm"></div>
      </div>
      <span class="mcl" onclick="closeD()">✕</span>
    </div>
    <div class="mbody" id="mb"></div>
  </div>
</div>
<div id="toast"></div>

<script>
var SCRIPT='https://script.google.com/macros/s/AKfycbxzviHF0P8eIwBT9EOC66Bt1H6TFc8EF3H5m6QDo4AszaqiF7PDSwB5FShlSnOkRJHYGA/exec';
var CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ6nBKr5P1RFidrD6V_7MRLRraKBrrf3CmT8StmKm4uPYL19HCE0zYHjJmY1E0TI-NYWR7AvJFu8RQ/pub?gid=357150087&single=true&output=csv';
var RATE={USD:30.5,JPY:0.205,EUR:33.5,TWD:1};

// 帳號管理
var BASE_USERS=[
  {id:'boss',role:'boss',name:'董事長',pwd:'boss2026'},
  {id:'staff',role:'staff',name:'業務員',pwd:'staff2026'},
  {id:'finance',role:'finance',name:'財務',pwd:'finance2026'}
];
function loadU(){
  try{
    var s=localStorage.getItem('tu');
    var base=BASE_USERS.map(function(u){
      var saved=s?JSON.parse(s).find(function(x){return x.id===u.id;}):null;
      return saved||u;
    });
    var cu=getCU();
    return base.concat(cu);
  }catch(e){return BASE_USERS;}
}
function saveU(arr){try{localStorage.setItem('tu',JSON.stringify(arr.filter(function(u){return ['boss','staff','finance'].indexOf(u.id)>=0;})));}catch(e){}}
function getCU(){try{var s=localStorage.getItem('tcu');return s?JSON.parse(s):[];}catch(e){return[];}}
function saveCU(a){try{localStorage.setItem('tcu',JSON.stringify(a));}catch(e){}}

var CU=loadU(), curUser=null, rows=[], filtered=[], logs=[];

var F={
  time:'時間戳記',email:'電子郵件地址',staff:'業務名稱',type:'案件屬性',name:'案件名稱',
  supp:'供應商名稱（賣方）',buyer:'客戶名稱（買方）',

function g(r,k){return(r[F[k]]||'').toString().trim();}
function pf(v){return parseFloat((v||'').toString().replace(/[^0-9.-]/g,''))||0;}
function cv(v){return v&&v.trim()&&v!=='—'&&v!=='0'&&v!=='-'&&v!=='undefined';}
function isPend(r){var s=g(r,'status');return s===''||s==='否'||s==='待審核'||s==='尚未';}

// 資料讀取
function load(){
  document.getElementById('dc').innerHTML='<div class="loading"><div class="spin"></div>從 Google Sheets 讀取...</div>';
  var url=SCRIPT+'?action=getData&_='+Date.now();
  fetch(url)
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      if(d.status==='ok'&&d.rows&&d.rows.length>0){
        // 只取 FormResponses 的資料，排除沒有業務名稱的空列
        rows=d.rows.filter(function(r){
          return r['業務名稱']&&r['業務名稱'].trim()!=='';
        });
        onLoad();
      } else {
        showErr();
      }
    })
    .catch(function(e){
      console.error('讀取失敗:',e);
      showErr();
    });
}
function onLoad(){
  // 去重：同一個表單編號只保留最新一筆
  var seen={};
  var deduped=[];
  rows.slice().reverse().forEach(function(r){
    var key=r['表單編號']||r['時間戳記']||r._row;
    if(!seen[key]){seen[key]=true;deduped.push(r);}
  });
  rows=deduped; // 覆蓋為去重後的資料
  filtered=rows.slice();
  buildStaffFilter();
  renderDash();
  renderTable(filtered);
  renderApproval();
  updateAlert();
}
function showErr(){
  document.getElementById('dc').innerHTML=
    '<div class="empty"><span class="eico">⚠️</span>'
    +'<div style="font-size:14px;font-weight:700;color:#dc2626;">無法讀取 Sheets</div>'
    +'<div style="font-size:12px;color:#64748b;margin-top:6px;">請確認 FormResponses 已發布 CSV<br>並確認 Apps Script 已更新並重新部署</div>'
    +'<a href="https://docs.google.com/spreadsheets/d/1qIHKxU-42qDVT2WDcLZp1Z3Ixg1_VRTURJ96uAVfyhM/edit" target="_blank" style="display:inline-block;margin-top:14px;padding:9px 20px;background:#0369a1;color:#fff;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;">開啟 Sheets</a>'
    +'<br><button onclick="load()" style="margin-top:10px;padding:9px 20px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;cursor:pointer;">重試</button></div>';
}
function parseCSV(csv){
  var lines=csv.split('\n').filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var hdrs=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim();});
  return lines.slice(1).map(function(line,idx){
    var vals=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      if(line[i]==='"')inQ=!inQ;
      else if(line[i]===','&&!inQ){vals.push(cur);cur='';}
      else cur+=line[i];
    }
    vals.push(cur);
    var obj={_row:idx+2};
    hdrs.forEach(function(h,i){obj[h]=(vals[i]||'').trim();});
    return obj;
  });
}

function doSearch(){
  var st=document.getElementById('fs').value;
  var sf=document.getElementById('fst').value;
  var ff=document.getElementById('ff').value;
  var ft=document.getElementById('ft').value;
  filtered=rows.filter(function(r){
    if(st==='p'&&!isPend(r))return false;
    if(st==='a'&&!isAppr(r))return false;
    if(st==='r'){var s=g(r,'status');if(!s.includes('退')&&s!=='退回')return false;}
    if(sf&&g(r,'staff')!==sf)return false;
    if(ff){var d=new Date(g(r,'time'));if(isNaN(d)||d<new Date(ff))return false;}
    if(ft){var d2=new Date(g(r,'time'));if(isNaN(d2)||d2>new Date(ft+'T23:59:59'))return false;}
    return true;
  }).slice().reverse();
  renderTable(filtered);
}

  document.getElementById('fs').value='';

function doApp(rowNum,status){
  var note=document.getElementById('an-'+rowNum).value;
  var r=rows.find(function(x){return x._row===rowNum;});
  var name=r?g(r,'buyer')+' — '+g(r,'name'):'Row'+rowNum;
  var b1=document.getElementById('bok-'+rowNum);
  var b2=document.getElementById('bng-'+rowNum);
  if(b1)b1.disabled=true;
  if(b2)b2.disabled=true;
  fetch(SCRIPT,{
    method:'POST',
    body:JSON.stringify({action:'approve',row:rowNum,status:status,note:note,approver:curUser.name,time:now()}),
    mode:'no-cors'
  }).finally(function(){
    if(r){r[F.status]=status;r[F.bossNote]=note;}
    addLog(status==='是'?'同意簽核':'退回修改',curUser.name,name,note);
    closeD();
    onLoad();
    toast(status==='是'?'✅ 已簽核！財務收到通知':'❌ 已退回',status==='是'?'#16a34a':'#dc2626');
  });
}

// 業務員修改案件
function doEdit(rowNum){
  var btn=document.getElementById('ebtn-'+rowNum);
  if(btn){btn.disabled=true;btn.textContent='儲存中...';}
  var fields={};
  var nm=document.getElementById('e-name-'+rowNum);
  var by=document.getElementById('e-buyer-'+rowNum);
  var ba=document.getElementById('e-buyamt-'+rowNum);
  var sa=document.getElementById('e-sellamt-'+rowNum);
  var etd=document.getElementById('e-etd-'+rowNum);
  var pr=document.getElementById('e-profit-'+rowNum);
  var br=document.getElementById('e-buyrem-'+rowNum);
  if(nm)fields['案件名稱']=nm.value;
  if(by)fields['客戶名稱（買方）']=by.value;
  if(ba)fields['應付總金額']=ba.value;
  if(sa)fields['應收總金額']=sa.value;
  if(etd)fields['ETD/卸魚日']=etd.value;
  if(pr)fields['預估毛利潤']=pr.value;
  if(br)fields['備註（採購）']=br.value;
  var r=rows.find(function(x){return x._row===rowNum;});
  fetch(SCRIPT,{
    method:'POST',
    body:JSON.stringify({action:'update',row:rowNum,fields:fields,editor:curUser.name}),
    mode:'no-cors'
  }).finally(function(){
    if(r){Object.keys(fields).forEach(function(k){r[k]=fields[k];});}
    addLog('修改案件',curUser.name,r?g(r,'name'):'Row'+rowNum,'');
    closeD();
    onLoad();
    toast('💾 修改已儲存','#0369a1');
    if(btn){btn.disabled=false;btn.textContent='💾 儲存修改';}
  });
}

// 後台
function renderAdmin(){
  var h='';
  BASE_USERS.forEach(function(u){
    var cu2=CU.find(function(x){return x.id===u.id;})||u;
    h+='<div class="uc" id="uc-'+u.id+'">'
      +'<div class="uc-role">'+u.role+'</div>'
      +'<div class="uc-nm">'+cu2.name+'</div>'
      +'<div class="uc-f"><label class="uc-l">顯示名稱</label><input class="uc-i" id="un-'+u.id+'" value="'+cu2.name+'"></div>'
      +'<div class="uc-f"><label class="uc-l">新密碼（留空不修改）</label><input class="uc-i" type="password" id="up-'+u.id+'" placeholder="輸入新密碼" autocomplete="new-password"></div>'
      +'<button class="btn-su" onclick="saveU2(\''+u.id+'\')">儲存</button>'
      +'<span class="svd" id="sv-'+u.id+'">✓ 已儲存</span></div>';
  });
  document.getElementById('ug').innerHTML=h;
  renderCU();
}
function saveU2(id){
  var name=document.getElementById('un-'+id).value.trim();
  var pwd=document.getElementById('up-'+id).value.trim();
  var arr=BASE_USERS.map(function(u){
    var c=CU.find(function(x){return x.id===u.id;})||{...u};
    if(u.id===id){if(name)c.name=name;if(pwd)c.pwd=pwd;}
    return c;
  });
  saveU(arr);
  CU=loadU();
  var sv=document.getElementById('sv-'+id);
  if(sv){sv.style.display='inline';setTimeout(function(){sv.style.display='none';},2000);}
  toast('✅ 已更新','#16a34a');
}
function addCU(){
  var cus=getCU();
  if(cus.length>=7){toast('最多 10 個帳號','#dc2626');return;}
  cus.push({id:'cu_'+Date.now(),role:'staff',name:'新帳號',pwd:'pass123'});
  saveCU(cus);CU=loadU();renderCU();
}
function renderCU(){
  var cus=getCU();
  if(!cus.length){document.getElementById('cu').innerHTML='<div style="font-size:12px;color:#94a3b8;padding:8px 0;">尚無自訂帳號</div>';return;}
  var h='<div class="ugrid">';
  cus.forEach(function(u){
    h+='<div class="uc"><div class="uc-f"><label class="uc-l">顯示名稱</label><input class="uc-i" id="cn-'+u.id+'" value="'+u.name+'"></div>'
      +'<div class="uc-f"><label class="uc-l">角色</label><select class="uc-i" id="cr-'+u.id+'">'
      +'<option value="boss"'+(u.role==='boss'?' selected':'')+'>董事長</option>'
      +'<option value="staff"'+(u.role==='staff'?' selected':'')+'>業務員</option>'
      +'<option value="finance"'+(u.role==='finance'?' selected':'')+'>財務</option>'
      +'</select></div>'
      +'<div class="uc-f"><label class="uc-l">密碼</label><input class="uc-i" id="cp-'+u.id+'" value="'+u.pwd+'"></div>'
      +'<div style="display:flex;gap:6px;margin-top:4px;">'
      +'<button class="btn-su" style="flex:2" onclick="saveCU2(\''+u.id+'\')">儲存</button>'
      +'<button style="flex:1;padding:8px;border-radius:7px;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;font-size:12px;font-weight:700;cursor:pointer;" onclick="delCU(\''+u.id+'\')">刪除</button>'
      +'</div></div>';
  });
  h+='</div>';
  document.getElementById('cu').innerHTML=h;
}
function saveCU2(id){
  var cus=getCU();
  var u=cus.find(function(x){return x.id===id;});
  if(!u)return;
  u.name=document.getElementById('cn-'+id).value.trim()||u.name;
  u.role=document.getElementById('cr-'+id).value;
  u.pwd=document.getElementById('cp-'+id).value.trim()||u.pwd;
  saveCU(cus);CU=loadU();toast('✅ 已儲存','#16a34a');
}
function delCU(id){
  saveCU(getCU().filter(function(x){return x.id!==id;}));
  CU=loadU();renderCU();
}

// Log
function addLog(a,u,tgt,n){
  var c=a.includes('同意')||a.includes('簽核')?'lok':a.includes('退回')?'lng':'lin';
  logs.push({t:now(),u:u,a:a,g:tgt,n:n,c:c});
  if(logs.length>200)logs.shift();
  try{localStorage.setItem('tl',JSON.stringify(logs));}catch(e){}
  renderLog();
}
function renderLog(){
  var lb=document.getElementById('lb');
  if(!lb)return;
  lb.innerHTML=logs.length===0
    ?'<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">尚無記錄</td></tr>'
    :logs.slice().reverse().map(function(l){
      return '<tr><td style="white-space:nowrap;font-size:11px;">'+l.t+'</td>'
        +'<td><b>'+l.u+'</b></td>'
        +'<td><span class="ltag '+l.c+'">'+l.a+'</span></td>'
        +'<td style="font-size:11px;">'+l.g+'</td>'
        +'<td style="font-size:11px;color:#64748b;">'+l.n+'</td></tr>';
    }).join('');
}

// Tab 切換
function goTabEl(el){goTab(el.dataset.tabid);}
function goTab(id){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('on');});
  var s=document.getElementById('s-'+id),t=document.getElementById('nt-'+id);
  if(s)s.classList.add('on');
  if(t)t.classList.add('on');
  if(id==='admin')renderAdmin();
  if(id==='log')renderLog();
}

// 工具
function fmtN(n){return Math.round(n||0).toLocaleString('zh-TW');}
function fmtM(n){var v=Math.round(n||0);return Math.abs(v)>=10000?(v/10000).toFixed(1)+'萬':v.toLocaleString('zh-TW');}
function now(){return new Date().toLocaleString('zh-TW',{hour12:false});}
function toast(msg,bg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.background=bg||'#16a34a';
  t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);
}
