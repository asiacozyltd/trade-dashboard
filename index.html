<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>貿易大漁｜管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0b1d35;--sea:#0369a1;--wave:#0ea5e9;--gold:#d97706;--gold2:#fbbf24;
  --jade:#16a34a;--coral:#dc2626;--paper:#f0f6fc;--card:#fff;--muted:#64748b;
  --border:#e2e8f0;--sh:0 2px 14px rgba(11,29,53,.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--paper);font-family:'Noto Sans TC',sans-serif;color:var(--ink);padding-bottom:80px;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink);}
.login-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-fish{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--sea),var(--wave));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;}
.login-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;color:var(--ink);}
.login-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.role-tabs{display:flex;gap:6px;margin-bottom:20px;background:#f8fafc;border-radius:10px;padding:4px;}
.role-tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;color:var(--muted);border:none;background:none;transition:all .2s;}
.role-tab.active{background:#fff;color:var(--sea);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.login-field{margin-bottom:14px;}
.login-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:6px;}
.login-input{width:100%;background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:border-color .2s;font-family:'Noto Sans TC',sans-serif;}
.login-input:focus{border-color:var(--sea);background:#fff;}
.login-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,var(--sea),var(--wave));color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:4px;}
.login-err{color:var(--coral);font-size:12px;text-align:center;margin-top:8px;height:16px;}

/* ── HEADER ── */
.hd{background:var(--ink);padding:14px 18px;position:sticky;top:0;z-index:100;}
.hd-row{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:9px;}
.fish{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--sea),var(--wave));display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-name{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--gold2);}
.brand-sub{font-size:10px;color:#7fa0c0;}
.hd-right{display:flex;align-items:center;gap:8px;}
.role-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;}
.rb-boss{background:rgba(212,168,19,.2);color:var(--gold2);border:1px solid rgba(212,168,19,.3);}
.rb-staff{background:rgba(14,165,233,.2);color:var(--wave);border:1px solid rgba(14,165,233,.3);}
.logout-btn{font-size:11px;color:#7fa0c0;cursor:pointer;padding:4px 8px;}

.alert{background:linear-gradient(90deg,#78350f,var(--gold));padding:10px 18px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:#fff;}
.alert.hide{display:none;}

/* ── SECTIONS ── */
.sec{padding:14px 14px 0;}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-lbl::before{content:'';width:2px;height:13px;background:var(--wave);border-radius:1px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden;box-shadow:var(--sh);}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.s1::before{background:linear-gradient(90deg,var(--sea),var(--wave));}
.s2::before{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.s3::before{background:linear-gradient(90deg,var(--jade),#4ade80);}
.s4::before{background:linear-gradient(90deg,var(--coral),#f87171);}
.stat-ico{font-size:20px;margin-bottom:6px;display:block;}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.v1{color:var(--sea);} .v2{color:var(--gold);} .v3{color:var(--jade);} .v4{color:var(--coral);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px;}

/* ── CARDS ── */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.ccard.pending{border-left:4px solid var(--gold);}
.ccard.approved{border-left:4px solid var(--jade);}
.ccard.rejected{border-left:4px solid var(--coral);}
.cc-top{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.cc-name{font-size:14px;font-weight:700;}
.cc-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.bp{background:#fef9c3;color:#92400e;border:1px solid #fde68a;}
.ba{background:#dcfce7;color:#14532d;border:1px solid #86efac;}
.br{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.bs{background:#e0f2fe;color:#075985;border:1px solid #bae6fd;}
.cc-body{padding:0 14px 10px;}
.cc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:12px;}
.cc-row:last-child{border-bottom:none;}
.ck{color:var(--muted);} .cv{color:var(--ink);font-weight:500;}
.cv.money{color:var(--jade);font-family:'DM Mono',monospace;}
.cv.cost{color:var(--coral);font-family:'DM Mono',monospace;}
.profit-strip{background:#f0fdf4;border-top:1px solid #dcfce7;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;}
.ps-lbl{font-size:11px;color:var(--jade);font-weight:700;}
.ps-val{font-size:17px;font-weight:700;color:var(--jade);font-family:'DM Mono',monospace;}
.cc-actions{display:flex;gap:8px;padding:10px 14px 12px;}
.btn-ok{flex:2;padding:11px;border-radius:10px;background:linear-gradient(135deg,#15803d,var(--jade));color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.btn-ng{flex:1;padding:11px;border-radius:10px;background:#fef2f2;color:var(--coral);border:1px solid #fca5a5;font-size:13px;font-weight:700;cursor:pointer;}

/* ── LOG TABLE ── */
.log-table{width:100%;border-collapse:collapse;font-size:12px;}
.log-table th{padding:8px 10px;background:#f1f5f9;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);text-align:left;}
.log-table td{padding:9px 10px;border-bottom:1px solid #f8fafc;color:var(--ink);vertical-align:middle;}
.log-table tr:last-child td{border-bottom:none;}
.log-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.lt-ok{background:#dcfce7;color:#14532d;}
.lt-ng{background:#fee2e2;color:#991b1b;}
.lt-in{background:#e0f2fe;color:#075985;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;animation:up .3s ease;}
@keyframes up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.modal-note{width:100%;background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;height:80px;resize:none;outline:none;font-family:'Noto Sans TC',sans-serif;}
.modal-note:focus{border-color:var(--sea);}
.modal-btns{display:flex;gap:10px;margin-top:14px;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 14px;cursor:pointer;color:var(--muted);font-size:10px;border:none;background:none;}
.bni .ico{font-size:20px;}
.bni.active{color:var(--sea);}
.pulse{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 1.5s infinite;margin-left:4px;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.screen{display:none;padding-bottom:80px;}
.screen.active{display:block;}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--wave);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:12px;color:var(--muted);font-size:13px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.empty-ico{font-size:40px;display:block;margin-bottom:10px;opacity:.4;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(50px);padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;pointer-events:none;color:#fff;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.card-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh);margin-bottom:10px;}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="login-fish">🐟</div>
        <div class="login-title">貿易大漁</div>
        <div class="login-sub">業務管理系統</div>
      </div>
      <div class="role-tabs">
        <button class="role-tab active" onclick="setRole('boss',this)">👑 董事長</button>
        <button class="role-tab" onclick="setRole('staff',this)">👤 業務員</button>
        <button class="role-tab" onclick="setRole('finance',this)">💰 財務</button>
      </div>
      <div class="login-field">
        <label class="login-label">密碼</label>
        <input class="login-input" type="password" id="login-pwd" placeholder="請輸入密碼"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="login-btn" onclick="doLogin()">登入</button>
      <div class="login-err" id="login-err"></div>
      <div style="margin-top:16px;padding:10px 12px;background:#f8fafc;border-radius:8px;font-size:11px;color:#94a3b8;line-height:1.7;">
        🔑 預設密碼：<br>
        董事長：<b style="color:#d97706;">boss2026</b><br>
        業務員：<b style="color:#0ea5e9;">staff2026</b><br>
        財務：<b style="color:#16a34a;">finance2026</b>
      </div>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="main-app" style="display:none;">

<header class="hd">
  <div class="hd-row">
    <div class="brand">
      <div class="fish">🐟</div>
      <div><div class="brand-name">貿易大漁</div><div class="brand-sub" id="hd-sub">管理系統</div></div>
    </div>
    <div class="hd-right">
      <span class="role-badge" id="role-badge"></span>
      <span class="logout-btn" onclick="doLogout()">登出</span>
      <span style="font-size:18px;cursor:pointer;" onclick="loadData()">↻</span>
    </div>
  </div>
</header>

<div class="alert hide" id="alert-bar">
  <span id="alert-txt"></span>
  <span onclick="switchScreen('approval')" style="cursor:pointer;text-decoration:underline;">前往審核 →</span>
</div>

<!-- 總覽 -->
<div class="screen active" id="screen-dash">
  <div id="dash-content"><div class="loading"><div class="spin"></div>載入中...</div></div>
</div>

<!-- 簽核 -->
<div class="screen" id="screen-approval">
  <div class="sec" style="padding-top:14px;">
    <div class="sec-lbl">待簽核合約 <span class="pulse" id="pdot" style="display:none;"></span></div>
    <div id="approval-list"></div>
  </div>
</div>

<!-- 紀錄 -->
<div class="screen" id="screen-records">
  <div class="sec" style="padding-top:14px;">
    <div class="sec-lbl">所有合約紀錄</div>
    <div id="records-list"></div>
  </div>
</div>

<!-- Log 紀錄 -->
<div class="screen" id="screen-log">
  <div class="sec" style="padding-top:14px;">
    <div class="sec-lbl">操作 Log 紀錄</div>
    <div class="card-wrap">
      <table class="log-table" id="log-table">
        <thead><tr>
          <th>時間</th><th>操作者</th><th>動作</th><th>對象</th><th>備注</th>
        </tr></thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Bottom Nav (動態產生) -->
<nav class="bnav" id="bnav"></nav>

</div><!-- end main-app -->

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">確認操作</div>
    <div class="modal-sub" id="modal-sub"></div>
    <textarea class="modal-note" id="modal-note" placeholder="批示或退回原因（選填）..."></textarea>
    <div class="modal-btns">
      <button class="btn-ng" style="flex:1;" onclick="closeModal()">取消</button>
      <button class="btn-ok" style="flex:2;" id="modal-confirm">確認</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var SCRIPT = 'https://script.google.com/macros/s/AKfycbzIvsU_cIVFXxL--cLtCiFtS-qoj9kMsn1RlD9qRw0Q0Um_M5hc1288HcekVYkKXHbL4w/exec';
var CSV    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ6nBKr5P1RFidrD6V_7MRLRraKBrrf3CmT8StmKm4uPYL19HCE0zYHjJmY1E0TI-NYWR7AvJFu8RQ/pub?output=csv';

// ── 密碼設定 ──
var PASSWORDS = {
  boss:    'boss2026',
  staff:   'staff2026',
  finance: 'finance2026'
};

var currentRole = 'boss';
var currentUser = '';
var allData = [];
var logs = [];
var pendingAction = null;

// ── 登入 ──
function setRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('login-pwd').value = '';
  document.getElementById('login-err').textContent = '';
}

function doLogin() {
  var pwd = document.getElementById('login-pwd').value;
  if (pwd === PASSWORDS[currentRole]) {
    currentUser = currentRole === 'boss' ? '董事長' : currentRole === 'staff' ? '業務員' : '財務';
    addLog('登入', currentUser, '', '');
    showApp();
  } else {
    document.getElementById('login-err').textContent = '密碼錯誤，請重新輸入';
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-pwd').focus();
  }
}

function doLogout() {
  addLog('登出', currentUser, '', '');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-pwd').value = '';
  currentUser = '';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';

  // 角色標籤
  var badge = document.getElementById('role-badge');
  var sub   = document.getElementById('hd-sub');
  if (currentRole === 'boss') {
    badge.textContent = '👑 董事長'; badge.className = 'role-badge rb-boss';
    sub.textContent = '董事長即時看板';
  } else if (currentRole === 'staff') {
    badge.textContent = '👤 業務員'; badge.className = 'role-badge rb-staff';
    sub.textContent = '業務員填報系統';
  } else {
    badge.textContent = '💰 財務'; badge.className = 'role-badge rb-staff';
    sub.textContent = '財務放款管理';
  }

  buildNav();
  loadData();
}

// ── 底部導覽（依角色不同）──
function buildNav() {
  var nav = document.getElementById('bnav');
  var items;
  if (currentRole === 'boss') {
    items = [
      {id:'dash',   ico:'📊', lbl:'總覽'},
      {id:'approval',ico:'✅', lbl:'簽核', pulse:true},
      {id:'records', ico:'📋', lbl:'紀錄'},
      {id:'log',     ico:'🔍', lbl:'Log'},
    ];
  } else if (currentRole === 'staff') {
    items = [
      {id:'dash',   ico:'📊', lbl:'我的案件'},
      {id:'records', ico:'📋', lbl:'所有紀錄'},
    ];
  } else {
    items = [
      {id:'dash',   ico:'📊', lbl:'總覽'},
      {id:'records', ico:'📋', lbl:'待放款'},
      {id:'log',     ico:'🔍', lbl:'Log'},
    ];
  }
  nav.innerHTML = items.map(it =>
    `<button class="bni${it.id==='dash'?' active':''}" id="nav-${it.id}" onclick="switchScreen('${it.id}')">`
    + `<span class="ico">${it.ico}</span>${it.lbl}`
    + (it.pulse ? `<span class="pulse" id="ndot" style="display:none;"></span>` : '')
    + `</button>`
  ).join('');
}

// ── 載入資料 ──
function loadData() {
  document.getElementById('dash-content').innerHTML = '<div class="loading"><div class="spin"></div>載入中...</div>';
  fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV + '&_=' + Date.now()))
    .then(r => r.text())
    .then(csv => { allData = parseCSV(csv); render(); })
    .catch(() => {
      fetch(CSV + '&_=' + Date.now())
        .then(r => r.text())
        .then(csv => { allData = parseCSV(csv); render(); })
        .catch(() => { showErr(); });
    });
}

function showErr() {
  document.getElementById('dash-content').innerHTML =
    '<div class="empty"><span class="empty-ico">⚠️</span>'
    + '<div style="font-size:13px;font-weight:700;color:#dc2626;">無法讀取 Sheets</div>'
    + '<div style="font-size:12px;color:#64748b;margin-top:6px;">請確認 Sheets 已發布為 CSV</div>'
    + '<a href="https://docs.google.com/spreadsheets/d/1qIHKxU-42qDVT2WDcLZp1Z3Ixg1_VRTURJ96uAVfyhM/edit" target="_blank" '
    + 'style="display:inline-block;margin-top:14px;padding:10px 20px;background:#0369a1;color:#fff;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;">開啟 Sheets</a></div>';
}

function parseCSV(csv) {
  var lines = csv.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  var hdrs = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map((line, idx) => {
    var vals = []; var cur = ''; var inQ = false;
    for (var i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += line[i];
    }
    vals.push(cur);
    var obj = { _row: idx + 2 };
    hdrs.forEach((h,i) => obj[h] = (vals[i]||'').trim());
    return obj;
  });
}

// ── 渲染 ──
function render() {
  var pending  = allData.filter(r => getField(r,'簽核狀態') === '待審核');
  var approved = allData.filter(r => getField(r,'簽核狀態') === '已簽核');
  var totalPay = sum(allData,'應付NTD');
  var totalRev = sum(allData,'應收NTD');
  var totalPro = sum(allData,'預估毛利NTD');
  var margin   = totalRev > 0 ? (totalPro/totalRev*100).toFixed(1) : 0;

  // alert
  var ab = document.getElementById('alert-bar');
  if (currentRole === 'boss' && pending.length) {
    ab.classList.remove('hide');
    document.getElementById('alert-txt').textContent = '⚠️ 有 ' + pending.length + ' 筆合約待您簽核';
    var pd = document.getElementById('pdot');
    var nd = document.getElementById('ndot');
    if(pd) pd.style.display = 'inline-block';
    if(nd) nd.style.display = 'inline-block';
  } else {
    ab.classList.add('hide');
  }

  // dashboard
  var d = '<div class="sec" style="padding-top:14px;"><div class="sec-lbl">財務總覽</div>'
    + '<div class="stats">'
    + sc('s1','📥','總進貨','NTD '+fmtM(totalPay),'v1', allData.length+' 筆')
    + sc('s2','📤','總出貨','NTD '+fmtM(totalRev),'v2','')
    + sc('s3','💹','總毛利','NTD '+fmtM(totalPro),'v3', margin+'%')
    + sc('s4','⏳','待簽核', pending.length+' 筆','v4','')
    + '</div></div>';

  if (currentRole === 'boss' && pending.length) {
    d += '<div class="sec" style="padding-top:10px;"><div class="sec-lbl">⚡ 待簽核</div>'
      + pending.slice(0,3).map(r => card(r, true)).join('') + '</div>';
  }
  d += '<div class="sec" style="padding-top:10px;"><div class="sec-lbl">最近合約</div>'
    + allData.slice(0,5).map(r => card(r, false)).join('') + '</div>';
  document.getElementById('dash-content').innerHTML = d;

  // approval
  document.getElementById('approval-list').innerHTML = pending.length
    ? pending.map(r => card(r, currentRole === 'boss')).join('')
    : '<div class="empty"><span class="empty-ico">✅</span>目前沒有待簽核合約</div>';

  // records
  var showData = currentRole === 'finance'
    ? allData.filter(r => getField(r,'簽核狀態') === '已簽核')
    : allData;
  document.getElementById('records-list').innerHTML = showData.length
    ? showData.map(r => card(r, false)).join('')
    : '<div class="empty"><span class="empty-ico">📋</span>尚無資料</div>';

  // log
  if (document.getElementById('log-body')) {
    var lb = document.getElementById('log-body');
    if (logs.length === 0) {
      lb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:20px;">尚無操作記錄</td></tr>';
    } else {
      lb.innerHTML = [...logs].reverse().map(l =>
        '<tr><td style="white-space:nowrap;font-size:11px;">' + l.time + '</td>'
        + '<td><b>' + l.user + '</b></td>'
        + '<td><span class="log-tag ' + l.cls + '">' + l.action + '</span></td>'
        + '<td style="font-size:11px;">' + l.target + '</td>'
        + '<td style="font-size:11px;color:#64748b;">' + l.note + '</td></tr>'
      ).join('');
    }
  }
}

function sc(cls,ico,lbl,val,vc,sub) {
  return '<div class="stat '+cls+'"><span class="stat-ico">'+ico+'</span>'
    +'<div class="stat-lbl">'+lbl+'</div><div class="stat-val '+vc+'">'+val+'</div>'
    +(sub?'<div class="stat-sub">'+sub+'</div>':'')+'</div>';
}

function card(r, showActions) {
  var status = getField(r,'簽核狀態') || '待審核';
  var sc2    = status==='待審核'?'pending':status==='已簽核'?'approved':'rejected';
  var bc     = status==='待審核'?'bp':status==='已簽核'?'ba':status==='退回修改'?'br':'bs';
  var buyer  = getField(r,'客戶(買方)') || getField(r,'客戶') || '—';
  var item   = getField(r,'品項') || '—';
  var staff  = getField(r,'業務名稱') || getField(r,'業務') || '—';
  var time   = getField(r,'時間戳記') || getField(r,'時間') || '';
  var buyNTD = pf(getField(r,'應付NTD'));
  var revNTD = pf(getField(r,'應收NTD'));
  var profit = pf(getField(r,'預估毛利NTD'));
  var note   = getField(r,'老闆批示') || '';
  var rowNum = r._row;

  var h = '<div class="ccard '+sc2+'">'
    + '<div class="cc-top"><div>'
    + '<div class="cc-name">'+buyer+'&nbsp;—&nbsp;'+item+'</div>'
    + '<div class="cc-meta">'+staff+'&nbsp;·&nbsp;'+time+'</div>'
    + '</div><span class="badge '+bc+'">'+status+'</span></div>'
    + '<div class="cc-body">'
    + r3('應付',    'NTD '+fmtN(buyNTD), 'cost')
    + r3('應收',    'NTD '+fmtN(revNTD), 'money')
    + r3('ETD→ETA', (getField(r,'ETD出貨日')||getField(r,'ETD')||'—')+' → '+(getField(r,'ETA到貨日')||getField(r,'ETA')||'—'), '')
    + r3('付款',    getField(r,'付款條件')||'—', '')
    + (note ? r3('批示', note, '') : '')
    + '</div>'
    + '<div class="profit-strip"><span class="ps-lbl">預估毛利</span>'
    + '<span class="ps-val">NTD '+fmtN(profit)+'</span></div>';

  if (showActions && status === '待審核') {
    h += '<div class="cc-actions">'
      + '<button class="btn-ng" onclick="doAction('+rowNum+','退回修改')">❌ 退回</button>'
      + '<button class="btn-ok" onclick="doAction('+rowNum+','已簽核')">✅ 簽核放款</button>'
      + '</div>';
  }
  h += '</div>';
  return h;
}

function r3(k,v,cls) {
  return '<div class="cc-row"><span class="ck">'+k+'</span><span class="cv '+cls+'">'+v+'</span></div>';
}

// ── 簽核 ──
function doAction(rowNum, status) {
  if (currentRole !== 'boss') { toast('只有董事長可以簽核', '#dc2626'); return; }
  pendingAction = { rowNum, status };
  var target = allData.find(r => r._row === rowNum);
  var name = target ? (getField(target,'客戶(買方)')||getField(target,'客戶')||'') + ' — ' + (getField(target,'品項')||'') : '';
  document.getElementById('modal-title').textContent = status === '已簽核' ? '✅ 確認簽核放款' : '❌ 退回給業務修改';
  document.getElementById('modal-sub').textContent = name;
  document.getElementById('modal-note').value = '';
  document.getElementById('modal').classList.add('open');
}

function confirmAction() {
  if (!pendingAction) return;
  var note   = document.getElementById('modal-note').value;
  var rowNum = pendingAction.rowNum;
  var status = pendingAction.status;
  var target = allData.find(r => r._row === rowNum);
  var name   = target ? (getField(target,'客戶(買方)')||'') + ' — ' + (getField(target,'品項')||'') : 'Row '+rowNum;
  closeModal();

  // 呼叫 Apps Script 寫回 Sheets
  fetch(SCRIPT, {
    method: 'POST',
    body: JSON.stringify({ action: 'approve', row: rowNum, status, note, approver: currentUser, time: now() }),
    mode: 'no-cors'
  }).finally(() => {
    if (target) { target['簽核狀態'] = status; target['老闆批示'] = note; }
    addLog(status === '已簽核' ? '簽核放款' : '退回修改', currentUser, name, note);
    render();
    toast(status === '已簽核' ? '✅ 已簽核！財務收到通知' : '❌ 已退回，業務收到通知',
          status === '已簽核' ? '#16a34a' : '#dc2626');
  });
}

document.getElementById('modal-confirm').onclick = confirmAction;
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Log ──
function addLog(action, user, target, note) {
  var cls = action.includes('簽核') ? 'lt-ok' : action.includes('退回') ? 'lt-ng' : 'lt-in';
  logs.push({ time: now(), user, action, target: target||'', note: note||'', cls });
  // 只保留最近 100 筆
  if (logs.length > 100) logs.shift();
  // 也存到 localStorage
  try { localStorage.setItem('trade_logs', JSON.stringify(logs)); } catch(e) {}
}

// ── 畫面切換 ──
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(b => b.classList.remove('active'));
  var s = document.getElementById('screen-' + id);
  var n = document.getElementById('nav-' + id);
  if (s) s.classList.add('active');
  if (n) n.classList.add('active');
  if (id === 'log') render();
}

// ── 工具 ──
function getField(r, key) {
  return r[key] || r[key.replace('(','(').replace(')',')')]|| '';
}
function pf(v) { return parseFloat(v) || 0; }
function sum(arr, key) { return arr.reduce((s,r) => s + pf(r[key]), 0); }
function fmtN(n) { return Math.round(n||0).toLocaleString('zh-TW'); }
function fmtM(n) {
  var v = Math.round(n||0);
  return Math.abs(v) >= 10000 ? (v/10000).toFixed(1)+'萬' : v.toLocaleString('zh-TW');
}
function now() {
  return new Date().toLocaleString('zh-TW', {hour12:false});
}
function toast(msg, bg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg||'#16a34a';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 載入歷史 log
try {
  var saved = localStorage.getItem('trade_logs');
  if (saved) logs = JSON.parse(saved);
} catch(e) {}

// 每 60 秒自動重整
setInterval(loadData, 60000);
</script>
</body>
